    <p id="cv-mobile-note" class="cv-mobile-note" hidden>
      Mobile browsers may limit embedded PDF scrolling.
      <a id="cv-open-mobile" href="assets/Elias_H_Bloom_CV.pdf" target="_self" rel="noopener">Open CV in full-screen viewer</a>.
    </p>

  </section>

<footer>© 2026 Elias H. Bloom · peas.phd</footer>
<script>
  // Avoid stale PDF caching after replacing the file in-place.
  (function () {
    var cvPath = 'assets/Elias_H_Bloom_CV.pdf';
    var cacheBust = Date.now();
    var cvUrl = cvPath + '?v=' + cacheBust;

    var frame = document.getElementById('cv-embed');
    var link = document.getElementById('cv-download');
    var mobileNote = document.getElementById('cv-mobile-note');
    var mobileOpenLink = document.getElementById('cv-open-mobile');

    if (frame) frame.src = cvUrl;
    if (link) link.href = cvUrl;
    if (mobileOpenLink) mobileOpenLink.href = cvUrl;

    // iOS/Android browsers often cannot scroll embedded PDFs reliably.
    // On touch/mobile screens, show a direct-open link instead of the iframe.
    var prefersMobileViewer =
      (window.matchMedia && window.matchMedia('(max-width: 900px)').matches) ||
      (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

    if (prefersMobileViewer) {
      if (frame) {
        frame.hidden = true;
        frame.setAttribute('aria-hidden', 'true');
      }
      if (mobileNote) {
        mobileNote.hidden = false;
      }
    }
  })();
</script>
