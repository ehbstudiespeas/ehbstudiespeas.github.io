<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // Render the PDF inline with pdf.js so mobile users can scroll all pages.
  (function () {
    var cvPath = 'assets/Elias_H_Bloom_CV.pdf';
    var cacheBust = Date.now();
    var cvUrl = cvPath + '?v=' + cacheBust;

    var viewer = document.getElementById('cv-viewer');
    var status = document.getElementById('cv-status');
    var link = document.getElementById('cv-download');

    if (link) link.href = cvUrl;
    if (!viewer) return;

    function showStatus(message) {
      if (status) {
        status.textContent = message;
      }
    }

    function clearStatus() {
      if (status && status.parentNode) {
        status.parentNode.removeChild(status);
      }
      status = null;
    }

    function showError(message) {
      showStatus(message);
      viewer.classList.add('cv-viewer-error');
    }

    if (!window.pdfjsLib) {
      showError('Could not load CV viewer. Please use the download link below.');
      return;
    }

    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function renderDocument(pdfDoc) {
      var pageNumber = 1;

      function renderNextPage() {
        if (pageNumber > pdfDoc.numPages) {
          clearStatus();
          return;
        }

        pdfDoc.getPage(pageNumber).then(function (page) {
          showStatus('Rendering page ' + pageNumber + ' of ' + pdfDoc.numPages + '…');
          var baseViewport = page.getViewport({ scale: 1 });
          var availableWidth = Math.max(viewer.clientWidth - 24, 240);
          // Render at a minimum of 760px for sharp text, but display at the
          // available width so there is no horizontal scroll on narrow screens.
          var renderWidth = Math.max(availableWidth, 760);
          var scale = renderWidth / baseViewport.width;
          var viewport = page.getViewport({ scale: scale });
          var outputScale = window.devicePixelRatio || 1;

          var pageFrame = document.createElement('div');
          pageFrame.className = 'cv-page-frame';

          var canvas = document.createElement('canvas');
          canvas.className = 'cv-page-canvas';
          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);
          canvas.style.width = availableWidth + 'px';
          canvas.style.height = Math.round(viewport.height * availableWidth / renderWidth) + 'px';

          var context = canvas.getContext('2d', { alpha: false });
          pageFrame.appendChild(canvas);
          viewer.appendChild(pageFrame);

          var renderContext = {
            canvasContext: context,
            viewport: viewport,
            transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
          };

          page.render(renderContext).promise
            .then(function () {
              pageNumber += 1;
              renderNextPage();
            })
            .catch(function () {
              showError('Could not render the full CV. Please use the download link below.');
            });
        }).catch(function () {
          showError('Could not render the full CV. Please use the download link below.');
        });
      }

      renderNextPage();
    }

    function loadPdfFromBytes(disableWorker) {
      return fetch(cvUrl, { cache: 'no-store' })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('Failed to fetch PDF');
          }
          return response.arrayBuffer();
        })
        .then(function (bytes) {
          return window.pdfjsLib.getDocument({
            data: bytes,
            disableWorker: !!disableWorker
          }).promise;
        });
    }

    loadPdfFromBytes(false)
      .catch(function () {
        // Some local/dev environments block worker startup; retry without worker.
        return loadPdfFromBytes(true);
      })
      .then(function (pdfDoc) {
        showStatus('Rendering CV…');
        renderDocument(pdfDoc);
      })
      .catch(function () {
        showError('Could not load CV preview. Please use the download link below.');
      });
  })();
</script>
