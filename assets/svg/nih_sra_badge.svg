<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">NIH SRA Badge</title>
  <desc id="desc">Neutral NIH and SRA badge for repository link.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3a67"/>
      <stop offset="100%" stop-color="#1f6fb2"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="116" height="116" rx="18" fill="url(#bg)"/>
  <rect x="18" y="28" width="92" height="28" rx="8" fill="#ffffff" fill-opacity="0.92"/>
  <text x="64" y="47" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f3a67">NIH</text>
  <text x="64" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">SRA</text>
  <text x="64" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#dbeafe">BIOPROJECT</text>
</svg>
