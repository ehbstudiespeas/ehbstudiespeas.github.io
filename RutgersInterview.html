  <style>
    /* ── Video player container ── */
    .interview-player {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16 / 9;
    }
    .interview-player video {
      width: 100%;
      height: 100%;
      display: block;
      margin: 0;
    }

    /* ── Panel toggle button ── */
    .panel-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 2px;
      margin-top: 10px;
      cursor: pointer;
      font-size: .82rem;
      font-family: var(--sans);
      color: var(--muted);
      text-align: left;
      transition: color .15s;
    }
    .panel-toggle:hover { color: var(--text); }
    .toggle-chevron {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-left: auto;
      transition: transform .3s ease;
    }
    .panel-toggle[aria-expanded="true"] .toggle-chevron {
      transform: rotate(180deg);
    }

    /* ── End panel — row of 5 small thumbnails ── */
    .end-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .45s ease, opacity .4s ease, margin .45s ease;
      margin-top: 0;
    }
    .end-panel.visible {
      max-height: 400px;
      opacity: 1;
      margin-top: 8px;
    }
    .end-panel[hidden] { display: none; }

    .end-panel-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .end-tile {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      display: block;
      text-decoration: none;
      height: 90px;
    }
    .end-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .2s ease, filter .2s ease;
    }
    .end-tile:hover img {
      transform: scale(1.04);
      filter: brightness(1.1);
    }
    .end-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.28);
      transition: background .2s ease;
    }
    .end-tile:hover::after {
      background: rgba(0,0,0,.1);
    }

    /* centered play button */
    .end-tile-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }
    .end-tile-play svg {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,.7));
    }

    /* bottom info bar */
    .end-tile-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 18px 6px 5px;
      background: linear-gradient(transparent, rgba(0,0,0,.82));
      z-index: 3;
      pointer-events: none;
    }
    .end-tile-label {
      font-size: .55rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
      margin-bottom: 1px;
    }
    .end-tile-title {
      font-size: .68rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* replay button */
    .end-panel-replay {
      display: block;
      margin: 10px auto 4px;
      background: var(--surface, #fff);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .82rem;
      font-family: var(--sans);
      padding: 6px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s;
    }
    .end-panel-replay:hover { background: var(--hover, #f0f0f0); }

    /* ── Card layout tweaks ── */
    .interview-card { margin-top: 40px; }
    .interview-card h1 { margin: 0 0 4px; font-size: 1.5rem; }
    .interview-card .q-meta {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 20px;
    }
    .interview-card .q-context {
      margin-top: 16px;
      font-size: .95rem;
      color: var(--muted);
      text-align: left;
    }
  </style>

<script>
  (function () {
    // helper: show element with animated transition
    function showEl(el) {
      el.hidden = false;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { el.classList.add('visible'); });
      });
    }

    // helper: collapse element and set hidden after transition
    function hideEl(el) {
      el.classList.remove('visible');
      el.addEventListener('transitionend', function onEnd() {
        el.removeEventListener('transitionend', onEnd);
        if (!el.classList.contains('visible')) el.hidden = true;
      });
    }

    // ── Fetch YouTube titles via oEmbed ───────────────────────────────────
    document.querySelectorAll('.end-tile[data-yt-id]').forEach(function (tile) {
      var ytId    = tile.getAttribute('data-yt-id');
      var titleEl = tile.querySelector('.end-tile-title');
      if (!ytId || !titleEl) return;
      fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch%3Fv%3D' + ytId + '&format=json')
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (d) { titleEl.textContent = d.title || 'Watch on YouTube'; })
        .catch(function ()  { titleEl.textContent = 'Watch on YouTube ↗'; });
    });

    // ── Toggle ────────────────────────────────────────────────────────────
    var toggleBtn = document.getElementById('panel-toggle-q1');
    var endPanel  = document.getElementById('end-panel-q1');
    if (toggleBtn && endPanel) {
      toggleBtn.addEventListener('click', function () {
        if (endPanel.classList.contains('visible')) {
          hideEl(endPanel);
          toggleBtn.setAttribute('aria-expanded', 'false');
        } else {
          showEl(endPanel);
          toggleBtn.setAttribute('aria-expanded', 'true');
        }
      });
    }

    // ── Replay ────────────────────────────────────────────────────────────
    var replayBtn = document.getElementById('replay-q1');
    var video     = document.getElementById('video-q1');
    if (replayBtn && video && endPanel) {
      replayBtn.addEventListener('click', function () {
        hideEl(endPanel);
        toggleBtn.setAttribute('aria-expanded', 'false');
        video.currentTime = 0;
        video.play();
      });
    }
  })();
</script>
