  <style>
    /* ── Video player container ── */
    .interview-player {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16 / 9;
    }
    .interview-player video {
      width: 100%;
      height: 100%;
      display: block;
      margin: 0;
    }

    /* ── YouTube-style info card (mid-video, top-left) ── */
    .yt-card {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 10px 8px 8px;
      max-width: 280px;
      z-index: 20;
      animation: slide-in .3s ease;
    }
    .yt-card[hidden] { display: none; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .yt-thumb {
      width: 80px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .yt-card-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .yt-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .yt-card-body a {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .yt-card-body a:hover { text-decoration: underline; }

    .yt-close {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      color: var(--muted);
      padding: 2px 4px;
    }
    .yt-close:hover { color: var(--text); }

    /* ── End-screen overlay (4-quadrant grid) ── */
    .end-screen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      z-index: 30;
      animation: fade-in .4s ease;
    }
    .end-screen[hidden] { display: none; }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .end-tile {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      display: block;
      text-decoration: none;
    }
    .end-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .2s ease, filter .2s ease;
    }
    .end-tile:hover img {
      transform: scale(1.04);
      filter: brightness(1.1);
    }

    /* play arrow badge */
    .end-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.25);
      transition: background .2s ease;
    }
    .end-tile:hover::after {
      background: rgba(0,0,0,.1);
    }
    .end-tile-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }
    .end-tile-play svg {
      width: clamp(24px, 12%, 44px);
      height: clamp(24px, 12%, 44px);
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.7));
    }

    /* replay button — sits centered at bottom of overlay */
    .end-replay {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      font-size: .82rem;
      font-family: var(--sans);
      padding: 5px 14px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      transition: background .2s;
    }
    .end-replay:hover { background: rgba(255,255,255,.28); }

    /* ── Card layout tweaks ── */
    .interview-card { margin-top: 40px; }
    .interview-card h1 { margin: 0 0 4px; font-size: 1.5rem; }
    .interview-card .q-meta {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 20px;
    }
    .interview-card .q-context {
      margin-top: 16px;
      font-size: .95rem;
      color: var(--muted);
      text-align: left;
    }
  </style>

<script>
  (function () {
    // ── Config: one entry per video ──────────────────────────────────────────
    var videos = [
      {
        videoId:     'video-q1',
        cardId:      'yt-card-q1',
        cueTime:     128,       // seconds — card appears at 2:08
        autoDismiss: 8000,      // ms — card hides at 2:16 (8 s window)
        endScreenId: 'end-screen-q1',
        replayId:    'replay-q1'
      }
      // Add more objects here for Q2–Q5
    ];
    // ─────────────────────────────────────────────────────────────────────────

    videos.forEach(function (cfg) {
      var video     = document.getElementById(cfg.videoId);
      var card      = document.getElementById(cfg.cardId);
      var endScreen = document.getElementById(cfg.endScreenId);
      var replayBtn = document.getElementById(cfg.replayId);
      if (!video) return;

      // ── Mid-video info card ──
      if (card) {
        var cardShown = false;
        var cardTimer = null;

        video.addEventListener('timeupdate', function () {
          if (!cardShown && video.currentTime >= cfg.cueTime) {
            card.hidden = false;
            cardShown = true;
            if (cfg.autoDismiss > 0) {
              cardTimer = setTimeout(function () { card.hidden = true; }, cfg.autoDismiss);
            }
          }
        });

        card.querySelector('.yt-close').addEventListener('click', function () {
          card.hidden = true;
          if (cardTimer) clearTimeout(cardTimer);
        });
      }

      // ── End-screen overlay ──
      if (endScreen) {
        video.addEventListener('ended', function () {
          endScreen.hidden = false;
        });

        if (replayBtn) {
          replayBtn.addEventListener('click', function () {
            endScreen.hidden = true;
            video.currentTime = 0;
            video.play();
          });
        }
      }
    });
  })();
</script>
